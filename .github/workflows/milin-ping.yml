name: milin-ping

on:
  schedule:
    - cron: '0 1-18 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger milin-ping cron
        run: |
          curl -sf https://milin-bot.vercel.app/api/cron/milin-ping \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
